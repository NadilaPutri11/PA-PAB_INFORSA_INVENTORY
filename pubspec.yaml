name: inforsa_inventory
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.10.8 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  file_picker: ^11.0.2
  excel: ^4.0.6
  csv: ^8.0.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  url_launcher: ^6.3.1
  responsive_builder: ^0.7.1
  rxdart: ^0.28.0
  data_table_2: ^2.7.2
  vibration: ^3.1.8
  image_picker: ^1.2.2
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.4
  test: ^1.26.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/icon.png"
  android: "ic_launcher"
  min_sdk_android: 21
  adaptative_icon_background: "assets/icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/.env
    - assets/logo_inforsa.png
    - assets/icon.png
